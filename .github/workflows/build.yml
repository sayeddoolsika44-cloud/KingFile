name: Build King File APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Build APK
      run: gradle assembleDebug --no-daemon 2>&1

    - name: Check output
      run: |
        echo "=== Build outputs ==="
        find . -name "*.apk" 2>/dev/null || echo "No APK found"
        echo "=== Build dir ==="
        ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KingFile-v7-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
        if-no-files-found: warn
