name: Build King File APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle 8.7
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
        unzip -q gradle-8.7-bin.zip
        echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

    - name: Setup local.properties with correct SDK path
      run: |
        SDK_PATH=$(dirname $(dirname $(which sdkmanager 2>/dev/null || echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager")))
        SDK_PATH=$(echo $SDK_PATH | sed 's|/cmdline-tools/latest||')
        echo "sdk.dir=$SDK_PATH" > local.properties
        echo "SDK path: $SDK_PATH"
        cat local.properties
        ls $SDK_PATH/platforms/ 2>/dev/null || true

    - name: Install SDK components
      run: |
        SDK_PATH=$(cat local.properties | cut -d= -f2)
        yes | $SDK_PATH/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-34" \
          "build-tools;34.0.0" 2>&1 | tail -5

    - name: Build APK
      run: |
        unset ANDROID_HOME
        unset ANDROID_SDK_ROOT
        gradle assembleDebug --no-daemon 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KingFile-v7-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
