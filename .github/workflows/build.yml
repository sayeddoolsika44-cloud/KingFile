name: Build King File APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle 8.7
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
        unzip -q gradle-8.7-bin.zip
        echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

    - name: Install SDK platforms
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-34" \
          "build-tools;34.0.0" 2>&1 | tail -3

    - name: Build APK
      run: |
        # استخدام ANDROID_SDK_ROOT فقط — إزالة ANDROID_HOME المتعارض
        unset ANDROID_HOME
        gradle assembleDebug --no-daemon --stacktrace 2>&1
      env:
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KingFile-v7-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
