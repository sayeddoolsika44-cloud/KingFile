name: Build King File APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=false"

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: none

    - name: Install Gradle 8.4 (no cache)
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
        unzip -q gradle-8.4-bin.zip
        echo "$PWD/gradle-8.4/bin" >> $GITHUB_PATH

    - name: Configure SDK
      run: |
        SDK=/usr/local/lib/android/sdk
        echo "sdk.dir=$SDK" > local.properties
        yes | $SDK/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-33" "build-tools;33.0.2" \
          --sdk_root=$SDK 2>&1 | tail -3

    - name: Build APK
      run: |
        unset ANDROID_HOME ANDROID_SDK_ROOT
        gradle assembleDebug \
          --no-daemon \
          --no-build-cache \
          --no-configuration-cache \
          2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KingFile-v7
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
        if-no-files-found: error
