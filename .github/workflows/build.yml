name: Build King File APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle 8.7
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
        unzip -q gradle-8.7-bin.zip
        echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

    - name: Configure Android SDK
      run: |
        for SDK in /usr/local/lib/android/sdk /home/runner/android-sdk $ANDROID_SDK_ROOT; do
          if [ -d "$SDK/platforms" ]; then
            REAL_SDK="$SDK"
            break
          fi
        done
        echo "sdk.dir=$REAL_SDK" > local.properties
        yes | $REAL_SDK/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-34" "build-tools;34.0.0" \
          --sdk_root=$REAL_SDK 2>&1 | tail -3

    - name: Build APK
      run: |
        unset ANDROID_HOME ANDROID_SDK_ROOT
        gradle assembleDebug --no-daemon 2>&1 | tail -20

    - name: Verify APK exists
      run: |
        APK=$(find . -name "app-debug.apk" 2>/dev/null | head -1)
        echo "APK path: $APK"
        if [ -z "$APK" ]; then
          echo "ERROR: APK not found!"
          find . -name "*.apk" 2>/dev/null || echo "No APK at all"
          exit 1
        fi
        ls -lh $APK
        echo "APK_PATH=$APK" >> $GITHUB_ENV

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KingFile-v7-APK
        path: ${{ env.APK_PATH }}
        retention-days: 90
        if-no-files-found: error
