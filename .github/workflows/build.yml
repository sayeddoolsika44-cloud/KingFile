name: Build King File APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle 8.7
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
        unzip -q gradle-8.7-bin.zip
        echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

    - name: Find and configure Android SDK
      run: |
        # البحث عن Android SDK في كل الأماكن المحتملة
        for SDK in /usr/local/lib/android/sdk /home/runner/android-sdk $ANDROID_SDK_ROOT $ANDROID_HOME; do
          if [ -d "$SDK/platforms" ]; then
            REAL_SDK="$SDK"
            break
          fi
        done
        echo "Real SDK: $REAL_SDK"
        
        # كتابة local.properties
        echo "sdk.dir=$REAL_SDK" > local.properties
        cat local.properties
        
        # تثبيت المكونات المطلوبة
        yes | $REAL_SDK/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          --sdk_root=$REAL_SDK 2>&1 | tail -3

    - name: Build APK
      run: |
        # إزالة كل متغيرات Android المتعارضة
        unset ANDROID_HOME ANDROID_SDK_ROOT
        gradle assembleDebug --no-daemon --stacktrace 2>&1 | tail -30

    - name: Find APK
      if: always()
      run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: KingFile-v7-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
