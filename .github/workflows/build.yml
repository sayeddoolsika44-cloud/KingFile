name: Build King File APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Check files
      run: |
        echo "=== Project structure ==="
        find . -name "*.kt" -o -name "*.xml" -o -name "*.gradle" | head -30
        echo "=== build.gradle ==="
        cat app/build.gradle

    - name: Build APK
      run: |
        gradle assembleDebug \
          --no-daemon \
          --info \
          2>&1 | grep -E "(ERROR|error:|FAILED|warning:|BUILD)" | head -50

    - name: Build APK Full
      run: gradle assembleDebug --no-daemon --stacktrace 2>&1 | tail -100

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: KingFile-v7-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
