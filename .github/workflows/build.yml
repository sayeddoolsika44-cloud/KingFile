name: Build King File APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle 8.7
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
        unzip -q gradle-8.7-bin.zip
        echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

    - name: Configure Android SDK
      run: |
        for SDK in /usr/local/lib/android/sdk /home/runner/android-sdk $ANDROID_SDK_ROOT; do
          if [ -d "$SDK/platforms" ]; then REAL_SDK="$SDK"; break; fi
        done
        echo "sdk.dir=$REAL_SDK" > local.properties
        yes | $REAL_SDK/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-34" "build-tools;34.0.0" \
          --sdk_root=$REAL_SDK 2>&1 | tail -3

    - name: Build APK (full output)
      run: |
        unset ANDROID_HOME ANDROID_SDK_ROOT
        gradle assembleDebug --no-daemon --info 2>&1 | grep -E "(error:|ERROR|warning:|WARN|Task|BUILD|APK|\.apk)" | head -80

    - name: Show all build output
      run: |
        echo "=== All files in build ==="
        find app/build -type f 2>/dev/null | head -30 || echo "no build dir"
        echo "=== APK search ==="
        find . -name "*.apk" 2>/dev/null || echo "none"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KingFile-v7-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
        if-no-files-found: warn
