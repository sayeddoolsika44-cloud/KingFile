name: Build King File APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "Available SDK:"
        ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"
        ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools"

    - name: Install Android SDK components
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-34" \
          "build-tools;34.0.0" 2>&1 | grep -E "(Downloading|Installing|done)" || true

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: List outputs
      if: always()
      run: find . -name "*.apk" 2>/dev/null && echo "Found APK" || echo "No APK"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: KingFile-v7-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
