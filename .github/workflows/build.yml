name: Build King File APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle 8.7
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
        unzip -q gradle-8.7-bin.zip
        echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

    - name: Install Android SDK
      run: |
        sudo apt-get install -y wget unzip
        # Android SDK موجود في runner
        echo "ANDROID_HOME=$ANDROID_HOME"
        ls $ANDROID_HOME/
        # تثبيت platform 34
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          --sdk_root=$ANDROID_HOME 2>&1 | tail -3

    - name: Build APK
      run: |
        gradle assembleDebug \
          --no-daemon \
          --project-dir . \
          --stacktrace \
          2>&1
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        JAVA_HOME: ${{ env.JAVA_HOME }}

    - name: Show outputs
      if: always()
      run: |
        echo "=== APK files ==="
        find . -name "*.apk" 2>/dev/null || echo "none"
        echo "=== Build dir ==="
        ls -la app/build/outputs/ 2>/dev/null || echo "no outputs"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: KingFile-v7-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
